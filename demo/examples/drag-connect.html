<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Drag & connect</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 16px; align-items: baseline; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    aside { position: fixed; right: 24px; top: 80px; padding: 12px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #475569; max-width: 240px; }
    aside b { color: #0f172a; }
    #app { width: 100vw; height: calc(100vh - 53px); }
    #log { position: fixed; left: 24px; bottom: 24px; padding: 8px 12px; font-family: ui-monospace, monospace; font-size: 12px; background: rgba(15, 23, 42, 0.85); color: #f1f5f9; border-radius: 6px; max-width: 380px; max-height: 160px; overflow-y: auto; }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Drag & connect</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/drag-connect.html">View source</a>
  </header>
  <aside>
    <b>Try it</b>
    <ol style="margin: 6px 0 0 18px; padding: 0;">
      <li>Drag a node to move it.</li>
      <li>Drag the right edge of a node to draw a new connection.</li>
      <li>Pan with empty-space drag, zoom with the wheel.</li>
    </ol>
  </aside>
  <div id="app"></div>
  <div id="log"></div>
  <script type="module">
    import { FlowChart, generateId } from '@flowgl/core'

    const log = document.getElementById('log')
    const append = (msg) => { log.textContent = msg + '\n' + log.textContent }

    const chart = new FlowChart({
      container: document.getElementById('app'),
      nodes: [
        { id: 'a', x: 120, y: 180, width: 140, height: 60, label: 'A' },
        { id: 'b', x: 360, y: 120, width: 140, height: 60, label: 'B' },
        { id: 'c', x: 360, y: 280, width: 140, height: 60, label: 'C' },
        { id: 'd', x: 600, y: 200, width: 140, height: 60, label: 'D' },
      ],
      edges: [
        { id: 'e1', source: 'a', target: 'b' },
        { id: 'e2', source: 'a', target: 'c' },
      ],
      autoFit: true,
    })

    chart.on('connect', ({ sourceId, targetId, sourceHandle, targetHandle }) => {
      chart.addEdge({ id: generateId('e'), source: sourceId, target: targetId, sourceHandle, targetHandle })
      append(`connected ${sourceId} → ${targetId}`)
    })

    chart.on('nodeDragEnd', ({ id, x, y }) => {
      append(`moved ${id} to (${Math.round(x)}, ${Math.round(y)})`)
    })
  </script>
</body>
</html>
