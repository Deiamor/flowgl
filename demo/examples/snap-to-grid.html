<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Snap to grid</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 16px; align-items: baseline; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    aside { position: fixed; right: 24px; top: 80px; padding: 12px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #475569; max-width: 260px; }
    aside b { color: #0f172a; }
    aside code { background: #f1f5f9; padding: 1px 4px; border-radius: 3px; font-size: 11px; }
    #app { width: 100vw; height: calc(100vh - 53px); }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Snap to grid</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/snap-to-grid.html">View source</a>
  </header>
  <aside>
    <b>Try it</b>
    <p style="margin: 4px 0 0;">Drag any node — the position locks to a 20-unit grid. <code>snapGrid: 20</code> + a matching dotted grid overlay.</p>
  </aside>
  <div id="app"></div>
  <script type="module">
    import { FlowChart } from '@flowgl/core'
    new FlowChart({
      container: document.getElementById('app'),
      snapGrid: 20,
      grid: { type: 'dots', size: 20 },
      nodes: [
        { id: 'a', x: 100, y: 200, width: 140, height: 60, label: 'Node A' },
        { id: 'b', x: 380, y: 200, width: 140, height: 60, label: 'Node B' },
        { id: 'c', x: 660, y: 200, width: 140, height: 60, label: 'Node C' },
      ],
      edges: [
        { id: 'e1', source: 'a', target: 'b' },
        { id: 'e2', source: 'b', target: 'c' },
      ],
      autoFit: true,
    })
  </script>
</body>
</html>
