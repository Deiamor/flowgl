<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="flowgl">
  <defs>
    <linearGradient id="flowgl-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Glyph: three nodes connected by two flowing edges, all forming an "f" silhouette -->
  <g transform="translate(8, 8)">
    <!-- top-left node -->
    <rect x="0" y="8" width="20" height="14" rx="3" fill="url(#flowgl-grad)"/>
    <!-- middle node -->
    <rect x="14" y="26" width="20" height="14" rx="3" fill="url(#flowgl-grad)" opacity="0.85"/>
    <!-- bottom-right node -->
    <rect x="28" y="44" width="20" height="14" rx="3" fill="url(#flowgl-grad)" opacity="0.7"/>
    <!-- edges (bezier) -->
    <path d="M 20 15 C 30 15, 14 33, 24 33" fill="none" stroke="url(#flowgl-grad)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 34 33 C 44 33, 28 51, 38 51" fill="none" stroke="url(#flowgl-grad)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="68" y="42" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="28" font-weight="600" fill="#0f172a">flowgl</text>
</svg>
