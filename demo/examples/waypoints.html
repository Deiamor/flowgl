<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Edge waypoints</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 16px; align-items: baseline; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    aside { position: fixed; right: 24px; top: 80px; padding: 12px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #475569; max-width: 280px; }
    aside b { color: #0f172a; }
    #app { width: 100vw; height: calc(100vh - 53px); }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Edge waypoints</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/waypoints.html">View source</a>
  </header>
  <aside>
    <b>Try it</b>
    <p style="margin: 4px 0 0;">Drag the midpoint of any edge to add a new waypoint. The dashed edge already starts with two waypoints; right-click them to remove.</p>
  </aside>
  <div id="app"></div>
  <script type="module">
    import { FlowChart } from '@flowgl/core'
    new FlowChart({
      container: document.getElementById('app'),
      nodes: [
        { id: 'a', x:  80, y: 200, width: 130, height: 60, label: 'Source' },
        { id: 'b', x: 540, y: 200, width: 130, height: 60, label: 'Sink' },
        { id: 'c', x:  80, y: 380, width: 130, height: 60, label: 'Alt source' },
        { id: 'd', x: 540, y: 380, width: 130, height: 60, label: 'Alt sink' },
      ],
      edges: [
        { id: 'straight', source: 'a', target: 'b' },
        { id: 'routed', source: 'c', target: 'd',
          waypoints: [{ x: 250, y: 460 }, { x: 410, y: 320 }],
          style: { dashArray: [8, 4] } },
      ],
      autoFit: true,
    })
  </script>
</body>
</html>
