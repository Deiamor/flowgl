<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Align & distribute</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; margin-right: 8px; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    header button { padding: 6px 10px; font-size: 12px; border: 1px solid #cbd5e1; background: white; border-radius: 4px; cursor: pointer; }
    header button:hover { border-color: #6366f1; color: #6366f1; }
    header .sep { color: #cbd5e1; margin: 0 4px; }
    aside { position: fixed; right: 24px; top: 100px; padding: 10px 14px; background: white; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; color: #475569; max-width: 240px; }
    #app { width: 100vw; height: calc(100vh - 60px); }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Align & distribute</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/align-distribute.html">View source</a>
    <span class="sep">·</span>
    <button data-align="left">⬅ Left</button>
    <button data-align="center-x">⬌ Center X</button>
    <button data-align="right">➡ Right</button>
    <button data-align="top">⬆ Top</button>
    <button data-align="center-y">⬍ Center Y</button>
    <button data-align="bottom">⬇ Bottom</button>
    <span class="sep">·</span>
    <button data-distribute="horizontal">↔ Dist. H</button>
    <button data-distribute="vertical">↕ Dist. V</button>
  </header>
  <aside>Select 2+ nodes (Cmd-click or box-select), then click an action.</aside>
  <div id="app"></div>
  <script type="module">
    import { FlowChart } from '@flowgl/core'
    const chart = new FlowChart({
      container: document.getElementById('app'),
      nodes: [
        { id: 'a', x: 80,  y: 100, width: 120, height: 60, label: 'A' },
        { id: 'b', x: 260, y: 220, width: 120, height: 50, label: 'B' },
        { id: 'c', x: 480, y: 160, width: 120, height: 70, label: 'C' },
        { id: 'd', x: 700, y: 280, width: 120, height: 55, label: 'D' },
      ],
      edges: [],
      autoFit: true,
    })
    chart.setSelectedIds(['a', 'b', 'c', 'd'])

    document.querySelectorAll('[data-align]').forEach((btn) => {
      btn.onclick = () => chart.alignNodes(btn.dataset.align)
    })
    document.querySelectorAll('[data-distribute]').forEach((btn) => {
      btn.onclick = () => chart.distributeNodes(btn.dataset.distribute)
    })
  </script>
</body>
</html>
