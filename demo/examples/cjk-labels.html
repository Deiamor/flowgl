<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Multi-line CJK labels</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 16px; align-items: baseline; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    aside { position: fixed; right: 24px; top: 80px; padding: 12px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #475569; max-width: 280px; }
    aside b { color: #0f172a; }
    aside code { background: #f1f5f9; padding: 1px 4px; border-radius: 3px; font-size: 11px; }
    #app { width: 100vw; height: calc(100vh - 53px); }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Multi-line CJK labels</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/cjk-labels.html">View source</a>
  </header>
  <aside>
    <b>Sizing rule</b>
    <p style="margin: 4px 0 0;">
      A multi-line node needs
      <code>height ≥ lineCount × fontSize × lineHeight + 2 × padding</code>.
      For 3 lines at <code>fontSize 14</code>, <code>height: 100</code> fits comfortably.
    </p>
    <p style="margin: 8px 0 0;">
      Double-click any node to edit. <code>Shift+Enter</code> inserts a newline;
      plain <code>Enter</code> commits.
    </p>
  </aside>
  <div id="app"></div>
  <script type="module">
    import { FlowChart } from '@flowgl/core'

    new FlowChart({
      container: document.getElementById('app'),
      nodes: [
        // Single-line CJK
        { id: 'ko', x:  80, y: 200, width: 160, height: 60, label: '한국어',
          style: { backgroundColor: '#fff', borderColor: '#43a047' } },
        { id: 'ja', x: 260, y: 200, width: 160, height: 60, label: '日本語',
          style: { backgroundColor: '#fff', borderColor: '#1e88e5' } },
        { id: 'zh', x: 440, y: 200, width: 160, height: 60, label: '中文测试',
          style: { backgroundColor: '#fff', borderColor: '#f9a825' } },
        { id: 'mix', x: 620, y: 200, width: 200, height: 60, label: 'Mixed 한글 test',
          style: { backgroundColor: '#fff', borderColor: '#e53935' } },

        // Multi-line — note the taller height
        { id: 'multi', x: 280, y: 340, width: 240, height: 100,
          label: '여러줄\nテスト\n测试',
          style: { backgroundColor: '#fff', borderColor: '#8e24aa' } },
      ],
      edges: [
        { id: 'e1', source: 'ko', target: 'multi' },
        { id: 'e2', source: 'ja', target: 'multi' },
        { id: 'e3', source: 'zh', target: 'multi' },
      ],
      autoFit: true,
    })
  </script>
</body>
</html>
