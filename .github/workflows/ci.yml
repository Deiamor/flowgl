name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Wrappers (react / vue / svelte) consume @flowgl/core via workspace
      # links and import its types. They typecheck against the published
      # `.d.ts` files in core/dist, so core must build before any wrapper
      # typecheck runs.
      - name: Build @flowgl/core (so wrappers can resolve its types)
        run: pnpm --filter @flowgl/core build

      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Test (all packages)
        run: pnpm test

      - name: Docs sync + docs-coverage audit
        # Sync derivable facts (test counts, badges, nav version) and audit
        # that every public export from packages/core/src/index.ts has at
        # least one mention under docs/. Fails the build when either is
        # out of date — closes the gap that let 0.5.0 → 0.9.1 ship with
        # the docs site stuck at 0.4.2.
        run: node scripts/sync-docs.mjs --check

      - name: Build (wrappers + demo)
        run: pnpm --filter '!@flowgl/core' build
