<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Cmd-click multi-select</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 16px; align-items: baseline; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    aside { position: fixed; right: 24px; top: 80px; padding: 12px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #475569; max-width: 280px; }
    aside b { color: #0f172a; }
    aside kbd { background: #f1f5f9; padding: 1px 6px; border-radius: 3px; font-size: 11px; border: 1px solid #cbd5e1; }
    aside .ids { display: block; margin-top: 8px; font-family: ui-monospace, monospace; color: #6366f1; font-size: 11px; word-break: break-all; }
    #app { width: 100vw; height: calc(100vh - 53px); }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Cmd-click multi-select</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/cmd-click-multi.html">View source</a>
  </header>
  <aside>
    <b>Try it</b>
    <p style="margin: 4px 0 0;">
      Click any node to select. <kbd>Cmd</kbd>+click (or <kbd>Ctrl</kbd>+click on Windows) to add to the selection. Click again to remove.
    </p>
    <span class="ids" id="ids">selected: (none)</span>
  </aside>
  <div id="app"></div>
  <script type="module">
    import { FlowChart } from '@flowgl/core'
    const chart = new FlowChart({
      container: document.getElementById('app'),
      nodes: [
        { id: 'red',    x: 100, y: 180, width: 130, height: 60, label: 'Red',    style: { borderColor: '#e53935' } },
        { id: 'green',  x: 280, y: 180, width: 130, height: 60, label: 'Green',  style: { borderColor: '#43a047' } },
        { id: 'blue',   x: 460, y: 180, width: 130, height: 60, label: 'Blue',   style: { borderColor: '#1e88e5' } },
        { id: 'yellow', x: 640, y: 180, width: 130, height: 60, label: 'Yellow', style: { borderColor: '#fbc02d' } },
        { id: 'purple', x: 820, y: 180, width: 130, height: 60, label: 'Purple', style: { borderColor: '#8e24aa' } },
      ],
      edges: [],
      autoFit: true,
    })
    const idsEl = document.getElementById('ids')
    chart.on('selectionChange', ({ selectedIds }) => {
      idsEl.textContent = selectedIds.length === 0
        ? 'selected: (none)'
        : 'selected: ' + selectedIds.join(', ')
    })
  </script>
</body>
</html>
