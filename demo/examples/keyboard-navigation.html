<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Keyboard navigation</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 16px; align-items: baseline; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    aside { position: fixed; right: 24px; top: 80px; padding: 12px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #475569; max-width: 280px; }
    aside b { color: #0f172a; display: block; margin-bottom: 6px; }
    aside kbd { background: #f1f5f9; padding: 1px 6px; border-radius: 3px; font-size: 11px; border: 1px solid #cbd5e1; }
    aside ul { margin: 0; padding-left: 18px; }
    #app { width: 100vw; height: calc(100vh - 53px); outline: none; }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Keyboard navigation</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/keyboard-navigation.html">View source</a>
  </header>
  <aside>
    <b>Try it (click the canvas first)</b>
    <ul>
      <li><kbd>Tab</kbd> cycle next node</li>
      <li><kbd>Shift</kbd>+<kbd>Tab</kbd> previous</li>
      <li><kbd>← ↑ → ↓</kbd> nudge by 10 units</li>
      <li><kbd>Delete</kbd> remove focused</li>
      <li><kbd>Cmd</kbd>+<kbd>Z</kbd> / <kbd>Cmd</kbd>+<kbd>Shift</kbd>+<kbd>Z</kbd> undo/redo</li>
      <li><kbd>Cmd</kbd>+<kbd>A</kbd> select all</li>
      <li><kbd>F</kbd> fit view</li>
    </ul>
  </aside>
  <div id="app"></div>
  <script type="module">
    import { FlowChart } from '@flowgl/core'
    new FlowChart({
      container: document.getElementById('app'),
      ariaLabel: 'Keyboard navigation demo',
      nodes: [
        { id: 'n1', x: 100, y: 160, width: 130, height: 50, label: 'First' },
        { id: 'n2', x: 100, y: 260, width: 130, height: 50, label: 'Second' },
        { id: 'n3', x: 100, y: 360, width: 130, height: 50, label: 'Third' },
        { id: 'n4', x: 320, y: 260, width: 130, height: 50, label: 'Fourth' },
        { id: 'n5', x: 540, y: 260, width: 130, height: 50, label: 'Fifth' },
      ],
      edges: [
        { id: 'e1', source: 'n1', target: 'n4' },
        { id: 'e2', source: 'n2', target: 'n4' },
        { id: 'e3', source: 'n3', target: 'n4' },
        { id: 'e4', source: 'n4', target: 'n5' },
      ],
      autoFit: true,
    })
  </script>
</body>
</html>
