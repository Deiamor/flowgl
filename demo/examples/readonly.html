<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Read-only mode</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 16px; align-items: baseline; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    header button { padding: 6px 12px; font-size: 13px; border: 1px solid #cbd5e1; background: white; border-radius: 6px; cursor: pointer; margin-left: auto; }
    header button:hover { border-color: #6366f1; color: #6366f1; }
    aside { position: fixed; right: 24px; top: 80px; padding: 12px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #475569; max-width: 260px; }
    #app { width: 100vw; height: calc(100vh - 53px); }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Read-only mode</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/readonly.html">View source</a>
    <button id="toggle">Toggle read-only</button>
  </header>
  <aside id="state">readOnly: <b>true</b> — pan/zoom still work, all edits disabled</aside>
  <div id="app"></div>
  <script type="module">
    import { FlowChart } from '@flowgl/core'

    const chart = new FlowChart({
      container: document.getElementById('app'),
      readOnly: true,
      nodes: [
        { id: 'a', x: 100, y: 200, width: 140, height: 60, label: 'Source' },
        { id: 'b', x: 380, y: 200, width: 140, height: 60, label: 'Process' },
        { id: 'c', x: 660, y: 200, width: 140, height: 60, label: 'Sink' },
      ],
      edges: [
        { id: 'e1', source: 'a', target: 'b' },
        { id: 'e2', source: 'b', target: 'c' },
      ],
      autoFit: true,
    })

    let ro = true
    const stateEl = document.getElementById('state')
    document.getElementById('toggle').onclick = () => {
      ro = !ro
      chart.setReadOnly(ro)
      stateEl.innerHTML = ro
        ? 'readOnly: <b>true</b> — pan/zoom still work, all edits disabled'
        : 'readOnly: <b>false</b> — drag, connect, dblclick to edit'
    }
  </script>
</body>
</html>
