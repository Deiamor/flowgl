<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Endpoint reroute</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 16px; align-items: baseline; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    aside { position: fixed; right: 24px; top: 80px; padding: 12px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #475569; max-width: 280px; }
    aside b { color: #0f172a; }
    #app { width: 100vw; height: calc(100vh - 53px); }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Endpoint reroute</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/endpoint-reroute.html">View source</a>
  </header>
  <aside>
    <b>Try it</b>
    <p style="margin: 4px 0 0;">Click an edge to select. The endpoint dots become draggable — drag onto any other node to reroute. Works for both source and target endpoints.</p>
  </aside>
  <div id="app"></div>
  <script type="module">
    import { FlowChart } from '@flowgl/core'
    new FlowChart({
      container: document.getElementById('app'),
      nodes: [
        { id: 'a', x:  80, y: 180, width: 120, height: 60, label: 'A' },
        { id: 'b', x: 260, y:  80, width: 120, height: 60, label: 'B' },
        { id: 'c', x: 260, y: 280, width: 120, height: 60, label: 'C' },
        { id: 'd', x: 460, y: 180, width: 120, height: 60, label: 'D' },
      ],
      edges: [
        { id: 'e1', source: 'a', target: 'b' },
        { id: 'e2', source: 'a', target: 'c' },
        { id: 'e3', source: 'b', target: 'd' },
      ],
      autoFit: true,
    })
  </script>
</body>
</html>
