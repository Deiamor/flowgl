name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Wrappers (react / vue / svelte) consume @flowgl/core via workspace
      # links and import its types. They typecheck against the published
      # `.d.ts` files in core/dist, so core must build before any wrapper
      # typecheck runs.
      - name: Build @flowgl/core (so wrappers can resolve its types)
        run: pnpm --filter @flowgl/core build

      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Test (all packages)
        run: pnpm test

      - name: Build (wrappers + demo)
        run: pnpm --filter '!@flowgl/core' build
