name: OSSF Scorecard

# OpenSSF Scorecard scores the repo against ~18 supply-chain heuristics
# (branch protection, pinned-deps, signed releases, security-policy,
# dependency-update tool, code-review enforcement, etc.). The
# `results.sarif` is uploaded to the Security tab so dropped scores
# show up in PR review.

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * 0' # Sundays 06:00 UTC
  workflow_dispatch: {}

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: actions/upload-artifact@v4
        with:
          name: SARIF
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
