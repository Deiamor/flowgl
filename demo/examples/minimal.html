<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Minimal</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 16px; align-items: baseline; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    #app { width: 100vw; height: calc(100vh - 53px); }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Minimal</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/minimal.html">View source</a>
  </header>
  <div id="app"></div>
  <script type="module">
    import { FlowChart } from '@flowgl/core'

    const chart = new FlowChart({
      container: document.getElementById('app'),
      nodes: [
        { id: 'a', x: 120, y: 200, width: 140, height: 60, label: 'Source' },
        { id: 'b', x: 360, y: 200, width: 140, height: 60, label: 'Transform' },
        { id: 'c', x: 600, y: 200, width: 140, height: 60, label: 'Sink' },
      ],
      edges: [
        { id: 'e1', source: 'a', target: 'b' },
        { id: 'e2', source: 'b', target: 'c' },
      ],
      autoFit: true,
    })
  </script>
</body>
</html>
