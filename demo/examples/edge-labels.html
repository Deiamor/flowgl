<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flowgl example — Edge labels</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 16px; align-items: baseline; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header a { color: #6366f1; text-decoration: none; font-size: 14px; }
    aside { position: fixed; right: 24px; top: 80px; padding: 12px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #475569; max-width: 280px; }
    #app { width: 100vw; height: calc(100vh - 53px); }
  </style>
</head>
<body>
  <header>
    <h1>flowgl — Edge labels</h1>
    <a href="./">← Gallery</a>
    <a href="https://github.com/Deiamor/flowgl/blob/master/demo/examples/edge-labels.html">View source</a>
  </header>
  <aside>Edge labels render at the bezier midpoint with a white background pill. Double-click an edge to edit its label inline.</aside>
  <div id="app"></div>
  <script type="module">
    import { FlowChart } from '@flowgl/core'
    new FlowChart({
      container: document.getElementById('app'),
      nodes: [
        { id: 'http',  x: 80,  y: 200, width: 130, height: 60, label: 'HTTP req' },
        { id: 'auth',  x: 280, y: 100, width: 130, height: 60, label: 'Authn' },
        { id: 'authz', x: 280, y: 300, width: 130, height: 60, label: 'Authz' },
        { id: 'route', x: 480, y: 200, width: 130, height: 60, label: 'Router' },
        { id: 'resp',  x: 680, y: 200, width: 130, height: 60, label: 'Response' },
      ],
      edges: [
        { id: 'e1', source: 'http',  target: 'auth',  label: 'cookie?' },
        { id: 'e2', source: 'http',  target: 'authz', label: 'role?' },
        { id: 'e3', source: 'auth',  target: 'route', label: 'pass' },
        { id: 'e4', source: 'authz', target: 'route', label: 'pass' },
        { id: 'e5', source: 'route', target: 'resp',  label: '200 OK' },
      ],
      autoFit: true,
    })
  </script>
</body>
</html>
